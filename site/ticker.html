<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>標的搜尋 - 投資Talk君</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell">

    <!-- ====== Header ====== -->
    <header class="app-header">
      <div class="header-row">
        <a href="index.html" class="brand">
          <div class="brand-icon">T</div>
          <div class="brand-text">投資<span>Talk</span>君</div>
        </a>

        <div class="header-actions">
          <div class="lang-toggle" data-lang="zh-Hant" role="radiogroup" aria-label="Language">
            <span class="lang-toggle-option active" data-lang="zh-Hant" role="radio" aria-checked="true">繁體</span>
            <span class="lang-toggle-option" data-lang="zh-Hans" role="radio" aria-checked="false">簡體</span>
            <div class="lang-toggle-slider" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ====== Ticker Search ====== -->
    <div class="ticker-search-container">
      <div class="ticker-search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="ticker-search-input" class="ticker-search-input" placeholder="搜尋股票代號..." autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false">
        <button type="button" id="ticker-search-clear" class="search-clear" aria-label="Clear search">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="ticker-autocomplete" id="ticker-autocomplete"></div>
    </div>

    <!-- ====== Popular Tickers ====== -->
    <div class="popular-tickers-section" id="popular-section">
      <div class="popular-tickers-label" id="popular-label">熱門標的</div>
      <div class="popular-tickers-chips" id="popular-chips">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- ====== Results ====== -->
    <div class="ticker-results" id="ticker-results">
      <!-- Populated by JS -->
    </div>

    <!-- ====== Loading ====== -->
    <div class="page-loader" id="page-loader">
      <div class="loader-dots">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
      </div>
    </div>

    <!-- ====== Bottom Navigation ====== -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span data-label="home">首頁</span>
      </a>
      <a href="ticker.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        <span data-label="tickersNav">標的</span>
      </a>
      <a href="bookmarks.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span data-label="bookmarks">收藏</span>
        <span class="nav-badge" data-count="0"></span>
      </a>
    </nav>
    <div class="nav-spacer"></div>

  </div><!-- /.app-shell -->

  <script src="js/bookmarks.js"></script>
  <script src="js/app.js"></script>
  <script src="js/ticker.js"></script>
  <script>
    (function () {
      'use strict';

      // Boot
      TalkApp.initLangToggle();
      TalkApp.updateBookmarkBadges();

      // Initialize ticker page
      TickerPage.init();

      // Language changes
      window.addEventListener('lang-changed', function () {
        TickerPage.onLangChanged();
        updateNavLabels();
        TalkApp.updateBookmarkBadges();
      });

      // Bookmark changes
      window.addEventListener('bookmark-changed', function () {
        TalkApp.updateBookmarkBadges();
      });

      /* ---- Nav Labels ---- */
      function updateNavLabels() {
        var labels = document.querySelectorAll('[data-label]');
        labels.forEach(function (el) {
          var key = el.getAttribute('data-label');
          if (key) el.textContent = TalkApp.label(key);
        });

        var hantOpt = document.querySelector('.lang-toggle-option[data-lang="zh-Hant"]');
        var hansOpt = document.querySelector('.lang-toggle-option[data-lang="zh-Hans"]');
        if (hantOpt) hantOpt.textContent = TalkApp.label('langHant');
        if (hansOpt) hansOpt.textContent = TalkApp.label('langHans');
      }

    })();
  </script>
</body>
</html>
