<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI問答 - 投資Talk君</title>
  <meta name="chat-api-url" content="https://talk-ai-api-production.up.railway.app/api/ask">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-shell chat-page">

    <!-- ====== Header ====== -->
    <header class="app-header">
      <div class="header-row">
        <a href="index.html" class="brand">
          <div class="brand-icon">T</div>
          <div class="brand-text">投資<span>Talk</span>君</div>
        </a>

        <div class="header-actions">
          <div class="lang-toggle" data-lang="zh-Hant" role="radiogroup" aria-label="Language">
            <span class="lang-toggle-option active" data-lang="zh-Hant" role="radio" aria-checked="true">繁體</span>
            <span class="lang-toggle-option" data-lang="zh-Hans" role="radio" aria-checked="false">簡體</span>
            <div class="lang-toggle-slider" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- ====== Chat Messages ====== -->
    <div class="chat-messages" id="chat-messages">
      <!-- Populated by JS -->
    </div>

    <!-- ====== Chat Input ====== -->
    <div class="chat-input-area">
      <textarea id="chat-input" class="chat-input" rows="1" placeholder="輸入你的投資問題..." autocomplete="off"></textarea>
      <button type="button" id="chat-send" class="chat-send-btn" aria-label="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <!-- ====== Bottom Navigation ====== -->
    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span data-label="home">首頁</span>
      </a>
      <a href="ticker.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
        <span data-label="tickersNav">標的</span>
      </a>
      <a href="bookmarks.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
        <span data-label="bookmarks">收藏</span>
        <span class="nav-badge" data-count="0"></span>
      </a>
      <a href="chat.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <span data-label="chatNav">AI問答</span>
      </a>
    </nav>

  </div><!-- /.app-shell -->

  <script src="js/bookmarks.js"></script>
  <script src="js/app.js"></script>
  <script src="js/chat.js"></script>
  <script>
    (function () {
      'use strict';

      // Boot
      TalkApp.initLangToggle();
      TalkApp.updateBookmarkBadges();

      // Initialize chat
      ChatModule.init();

      // Language changes
      window.addEventListener('lang-changed', function () {
        ChatModule.onLangChanged();
        updateNavLabels();
        TalkApp.updateBookmarkBadges();
      });

      // Bookmark changes
      window.addEventListener('bookmark-changed', function () {
        TalkApp.updateBookmarkBadges();
      });

      /* ---- Nav Labels ---- */
      function updateNavLabels() {
        var labels = document.querySelectorAll('[data-label]');
        labels.forEach(function (el) {
          var key = el.getAttribute('data-label');
          if (key) el.textContent = TalkApp.label(key);
        });

        var hantOpt = document.querySelector('.lang-toggle-option[data-lang="zh-Hant"]');
        var hansOpt = document.querySelector('.lang-toggle-option[data-lang="zh-Hans"]');
        if (hantOpt) hantOpt.textContent = TalkApp.label('langHant');
        if (hansOpt) hansOpt.textContent = TalkApp.label('langHans');
      }

    })();
  </script>
</body>
</html>
