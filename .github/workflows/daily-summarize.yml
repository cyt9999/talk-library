name: Daily Summarize

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install yt-dlp

      - name: Install ffmpeg and deno
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          curl -fsSL https://deno.land/install.sh | sh
          echo "$HOME/.deno/bin" >> $GITHUB_PATH

      - name: Write YouTube cookies
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s\n' "$YT_COOKIES" > /tmp/yt_cookies.txt
            echo "Cookies file written ($(wc -l < /tmp/yt_cookies.txt) lines)"
          else
            echo "No YT_COOKIES secret found, skipping"
          fi

      - name: Run pipeline (YouTube)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -f /tmp/yt_cookies.txt ]; then
            export YT_COOKIES_FILE=/tmp/yt_cookies.txt
          fi
          cd scripts && python run_pipeline.py youtube

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: auto-summarize new videos $(date +%Y-%m-%d)"
          git pull --rebase || true
          git push
