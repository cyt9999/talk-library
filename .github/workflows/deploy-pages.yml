name: Deploy to GitHub Pages (disabled — frontend now on Railway)

# Disabled: frontend is served by Railway alongside the API
# To re-enable, uncomment the triggers below
on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    if: false  # Disabled
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
